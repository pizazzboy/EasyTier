name: Build and Push Docker Image

# 触发条件：push到main分支、创建tag时自动构建
on:
  push:
    branches: [ main ]
    tags: [ v* ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 步骤1：检出你的源码
      - name: Checkout code
        uses: actions/checkout@v4

      # 步骤2：登录Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 步骤3：构建并推送Docker镜像
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          # 镜像名称：你的DockerHub用户名/easytier:latest
          tags: ${{ secrets.DOCKER_USERNAME }}/easytier:latest
